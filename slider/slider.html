<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>التحولات</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@600&family=Cairo:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      font-family: 'Cairo', sans-serif;
      min-height: 100vh;
    }

    .section {
      padding: 60px 20px;
      text-align: center;
    }

    .section h2 {
      font-family: 'Oswald', sans-serif;
      color: #ff0000;
      font-size: 48px;
      letter-spacing: 4px;
      margin-bottom: 50px;
      text-transform: uppercase;
      position: relative;
      display: inline-block;
    }

    .section h2::after {
      content: '';
      display: block;
      width: 60%;
      height: 3px;
      background: #ff0000;
      margin: 10px auto 0;
      border-radius: 2px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 24px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      background: #141414;
      border-radius: 20px;
      padding: 16px 16px 20px;
      border: 1px solid #222;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 40px rgba(255,0,0,0.2);
    }

    .images {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }

    .img-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 50%;
    }

    .img-wrap img {
      width: 100%;
      height: 340px;
      object-fit: cover;
      border-radius: 12px;
      display: block;
    }

    .label {
      display: inline-block;
      padding: 5px 16px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      font-family: 'Oswald', sans-serif;
    }

    .before-lbl {
      background: #1a1a1a;
      color: #888;
      border: 1px solid #444;
    }

    .after-lbl {
      background: #ff0000;
      color: #fff;
      box-shadow: 0 0 12px rgba(255,0,0,0.5);
    }

    .card h3 {
      color: #fff;
      font-size: 16px;
      font-family: 'Cairo', sans-serif;
      font-weight: 700;
      margin-top: 4px;
    }
  </style>
</head>
